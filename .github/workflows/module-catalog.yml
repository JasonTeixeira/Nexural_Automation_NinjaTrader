name: module-catalog

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  module-catalog-up-to-date:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Regenerate MODULES.md
        run: |
          python scripts/repo-tools/generate_module_catalog.py --out MODULES.md

      - name: Ensure MODULES.md is committed
        run: |
          git diff --exit-code MODULES.md
