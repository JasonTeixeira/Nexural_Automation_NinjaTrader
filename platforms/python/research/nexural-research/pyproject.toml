[build-system]
requires = ['setuptools>=69', 'wheel']
build-backend = 'setuptools.build_meta'

[project]
name = 'nexural-research'
version = '2.0.0'
description = 'Institutional-grade strategy analysis engine for NinjaTrader trade exports. 71+ metrics, Monte Carlo, walk-forward, overfitting detection, stress testing, and full quant analytics.'
readme = 'README.md'
requires-python = '>=3.11'
dependencies = [
  # Core data processing
  'numpy>=2.0',
  'pandas>=2.2',
  'pydantic>=2.7',
  'pyyaml>=6.0',
  'rich>=13.7',

  # Statistical analysis
  'scipy>=1.13',
  'statsmodels>=0.14',
  'scikit-learn>=1.5',

  # Storage + registry
  'pyarrow>=16.0',
  'duckdb>=1.0',

  # Database (optional — SQLite default, PostgreSQL in production)
  'sqlalchemy>=2.0',

  # Reporting & visualization
  'plotly>=5.22',
  'openpyxl>=3.1',

  # API server
  'fastapi>=0.111',
  'uvicorn[standard]>=0.30',
  'python-multipart>=0.0.9',
  'httpx>=0.27',
]

[project.optional-dependencies]
postgres = [
  'asyncpg>=0.29',
  'psycopg2-binary>=2.9',
  'alembic>=1.13',
]
dev = [
  'pytest>=8.0',
  'pytest-cov>=5.0',
  'ruff>=0.4',
  'httpx>=0.27',
  'bandit>=1.7',
  'mypy>=1.10',
]

[project.scripts]
nexural-research = 'nexural_research.cli:main'
nexural-server = 'nexural_research.api.app:run_server'

[tool.setuptools]
package-dir = {'' = 'src'}

[tool.setuptools.packages.find]
where = ['src']

[tool.pytest.ini_options]
testpaths = ['tests']
addopts = '--tb=short -q -p no:randomly'

[tool.ruff]
line-length = 100
target-version = 'py311'

[tool.ruff.lint]
select = ['E', 'F', 'W', 'I']

[tool.mypy]
python_version = '3.11'
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

[tool.coverage.run]
source = ['src/nexural_research']
omit = [
  '*/tests/*',
  'src/nexural_research/cli.py',
  'src/nexural_research/cli_helpers.py',
  'src/nexural_research/utils/paths.py',
  'src/nexural_research/utils/config.py',
  'src/nexural_research/utils/hashing.py',
  'src/nexural_research/schemas/*',
  'src/nexural_research/registry/*',
  # External API calls — require real API keys, tested manually
  'src/nexural_research/api/ai_analyst.py',
]

[tool.coverage.report]
show_missing = true
fail_under = 80

[tool.bandit]
exclude_dirs = ['tests', '.venv']
